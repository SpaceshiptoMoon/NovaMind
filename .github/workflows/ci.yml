name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend-smoke:
    name: Backend Smoke Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run focused backend smoke tests
        working-directory: backend
        run: |
          pytest tests/test_document_task_retry_count.py -q
          pytest tests/test_knowledge_base_service_config.py -q

  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run type check
        working-directory: frontend
        run: npm run type-check

      - name: Run unit tests
        working-directory: frontend
        run: npm run test:unit -- --run

      - name: Run lint
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker-build:
    name: Docker Build Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare runtime config
        run: |
          cp .env.example .env
          cp docker/configs/docker.example docker/configs/docker.yaml
          cp backend/src/setting/yaml_config/yaml/default.example backend/src/setting/yaml_config/yaml/default.yaml

      - name: Build app image
        run: docker compose build app
