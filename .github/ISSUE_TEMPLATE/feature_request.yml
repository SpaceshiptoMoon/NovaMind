name: Feature Request
description: Suggest a new capability or improvement
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please describe the problem and the proposed improvement as concretely as possible.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: What change would you like to see?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternatives have you considered?

  - type: dropdown
    id: area
    attributes:
      label: Related Area
      options:
        - backend
        - frontend
        - docker
        - documentation
        - agent
        - knowledge space
        - deep research
        - evaluation
        - clawmate
        - other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add examples, screenshots, references, or API sketches if useful.
