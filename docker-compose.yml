# ========================================
# NovaMind - One-Command Docker Compose
# ========================================
# Usage:
#   docker compose up -d
#   docker compose logs -f
#   docker compose down
#   docker compose up -d --build
#
# The `app` container serves:
# - frontend static assets through Nginx
# - backend API through `backend/main.py`
#
# Runtime config file mount:
#   ./docker/configs/docker.yaml -> /app/src/setting/yaml_config/yaml/docker.yaml

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: novamind-app
    ports:
      - "80:80"
    env_file:
      - .env
    volumes:
      - ./docker/configs/docker.yaml:/app/src/setting/yaml_config/yaml/docker.yaml:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: on-failure
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    container_name: novamind-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: novamind-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - app-network

  minio:
    image: minio/minio
    container_name: novamind-minio
    ports:
      - "9005:9005"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    command: server /data --address ":9005" --console-address ":9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped
    networks:
      - app-network

  elasticsearch:
    image: elasticsearch:8.15.0
    container_name: novamind-elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=${ES_JAVA_OPTS}"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    volumes:
      - es-data:/usr/share/elasticsearch/data
    restart: unless-stopped
    networks:
      - app-network

volumes:
  mysql-data:
  redis-data:
  minio-data:
  es-data:

networks:
  app-network:
    driver: bridge
