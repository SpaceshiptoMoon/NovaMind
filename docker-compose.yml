# ========================================
# NovaMind - One-Command Docker Compose
# ========================================
# Usage:
#   docker compose up -d
#   docker compose logs -f
#   docker compose down
#   docker compose up -d --build
#
# Runtime config file mount:
#   ./docker/configs/docker.yaml -> /app/src/setting/yaml_config/yaml/docker.yaml
#
# Infra ports (mysql/redis/minio/es) are bound to 127.0.0.1 so they are reachable
# only from the host, not exposed publicly. The app container reaches them over
# the `app-network` bridge, unaffected by this binding. If you deploy on a remote
# host and need external access to an infra port, change 127.0.0.1:<p>:<p> to <p>:<p>.

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: novamind-app
    ports:
      - "80:80"
    env_file:
      - .env
    volumes:
      - ./docker/configs/docker.yaml:/app/src/setting/yaml_config/yaml/docker.yaml:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    restart: on-failure
    networks:
      - app-network

  mysql:
    image: mysql:8.4.10
    container_name: novamind-mysql
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 40s
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - app-network

  redis:
    image: redis:7.4.9-alpine
    container_name: novamind-redis
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - app-network

  minio:
    image: minio/minio
    container_name: novamind-minio
    ports:
      - "127.0.0.1:9005:9005"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    command: server /data --address ":9005" --console-address ":9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped
    networks:
      - app-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.7
    container_name: novamind-elasticsearch
    ports:
      - "127.0.0.1:9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=${ES_JAVA_OPTS}"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 50s
    volumes:
      - es-data:/usr/share/elasticsearch/data
    restart: unless-stopped
    networks:
      - app-network

volumes:
  mysql-data:
  redis-data:
  minio-data:
  es-data:

networks:
  app-network:
    driver: bridge