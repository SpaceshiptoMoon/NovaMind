# ========================================
# novamind - 默认共享配置
# ========================================
# 此文件包含所有环境的共享配置
# 环境配置文件（development.yaml 等）会与此文件深度合并
# 环境配置只需覆盖需要改变的部分
#
# ⚠️ 所有配置值硬编码，不使用环境变量占位符
# ⚠️ 不同环境通过对应环境文件覆盖（如 development.yaml）

# 项目信息
project:
  name: novamind
  version: 0.1.0
  description: novamind - 智能知识库管理系统后端

# 环境标识（由环境配置覆盖）
environment: development
debug: false

# 安全配置
security:
  secret_key: "75f9ba94fd0e64cd04dd37486319b43b47fe86d0abd76c4190a644520b8259a6"
  algorithm: HS256
  access_token_expire_minutes: 30
  encryption_key: "a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6"  # AES-256 数据加密密钥

# MySQL 数据库配置
database:
  host: localhost
  port: 3306
  user: root
  password: "139790"
  database: novamind_db
  pool_size: 10
  max_overflow: 20
  pool_timeout: 30
  pool_recycle: 3600
  pool_pre_ping: true

# Redis 缓存配置
redis:
  enabled: false
  host: localhost
  port: 6379
  db: 0
  password: ""

# ========================================
# 对象存储配置 (MinIO)
# ========================================
minio:
  endpoint: "127.0.0.1:9005"
  access_key: "admin123"
  secret_key: "admin123"
  secure: false
  region: us-east-1
  bucket_name: "novamind-dev"

# ========================================
# Elasticsearch 配置
# ========================================
elasticsearch:
  hosts:
    - "http://127.0.0.1:9200"
  username: "elastic"
  password: "QA41kZI8pGpEHmiJlCTT"
  # 索引配置
  index_prefix: kb  # 索引前缀，实际索引名为 {prefix}_{kb_id}
  # 向量配置
  default_embedding_dim: 1024
  # 分词器配置
  analyzer: standard  # 标准分词器（需安装 IK 插件时改为 ik_max_word）

# ========================================
# 向量存储配置
# ========================================
# 使用 Elasticsearch 进行向量检索
vector_db:
  type: elasticsearch

# ========================================
# 管理员账户配置
# ========================================
admin:
  username: "admin"
  email: "admin@example.com"
  password: "Admin@123456"
  create_on_startup: true
  reset_password_if_exists: true

# CORS 配置
cors_origins: "*"

# 缓存配置
cache:
  knowledge_space_enabled: true
  knowledge_space_expire_hours: 1
  knowledge_space_similarity_threshold: 0.95
  session_enabled: true
  session_expire_hours: 24
  vector_search_enabled: true
  search_result_ttl: 3600  # 检索结果缓存 1 小时

# 日志配置
logging:
  level: INFO
  format: json

# ========================================
# 外部搜索配置
# ========================================
external_search:
  # 默认搜索服务商：tavily / serpapi / duckduckgo
  # duckduckgo 免费，无需 API Key
  default_provider: duckduckgo

  # Tavily 搜索配置（推荐，专为 AI 优化）
  tavily:
    api_key: ""
    max_results: 10
    search_depth: basic  # basic / advanced
    timeout: 30

  # SerpAPI 搜索配置（Google 搜索结果）
  serpapi:
    api_key: ""
    max_results: 10
    timeout: 30

  # DuckDuckGo 搜索配置（免费，无需 API Key）
  duckduckgo:
    max_results: 10
    timeout: 15

# ========================================
# 深度研究配置
# ========================================
deep_research:
  # 缓存配置
  cache_results: true
  cache_ttl_hours: 24

# ========================================
# Agent 智能体配置
# ========================================
agent:
  max_tool_calls_per_turn: 10
  default_max_tokens: 4096
  default_context_window: 32768
  default_temperature: 0.7
  max_context_tokens: 8000
  mcp_connection_timeout: 30
  # 沙箱配置（代码执行环境）
  sandbox:
    enabled: false                    # 默认关闭，需安装 Docker 后手动开启
    max_memory_mb: 256                # 容器内存上限（MB）
    max_output_bytes: 65536           # stdout/stderr 各自最大字节数（64KB）
    default_timeout: 30               # 默认执行超时（秒）
    max_timeout: 120                  # 用户可设置的最大超时（秒）
    network_disabled: true            # 容器无网络访问
    rebuild_interval: 50              # 每执行 N 次重建容器，防止状态累积
    container_prefix: "agent_sandbox"  # 容器名前缀
    images:
      python: "python:3.12-slim"
      javascript: "node:20-slim"
      shell: "bash:5"


# ========================================
# 模型配置（系统初始化时同步到数据库）
# ========================================
# 运行时主路径：model_configs → DB → ModelConfigService
# 启动时同步到数据库后，运行时不再读取此配置
# user_id = NULL 表示系统配置，所有用户共享
# 每个模型条目独立配置凭证，不使用共享凭证
model_configs:
  # LLM 模型配置
  llm:
    - protocol: openai
      model: qwen3.5-plus
      api_key: "sk-4fd381820c2b4168932af0b7ac6273ad"
      base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"

    - protocol: openai
      model: qwen3.5-plus-2026-02-15
      api_key: "sk-4fd381820c2b4168932af0b7ac6273ad"
      base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"

    - protocol: openai
      model: qwen3.5-27b
      api_key: "sk-4fd381820c2b4168932af0b7ac6273ad"
      base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"

    - protocol: openai
      model: qwen3-max-2026-01-23
      api_key: "sk-4fd381820c2b4168932af0b7ac6273ad"
      base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"

  # Embedding 模型配置（dimension 由启动时自动检测）
  embedding:
    - protocol: openai
      model: text-embedding-v2
      api_key: "sk-4fd381820c2b4168932af0b7ac6273ad"
      base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"

    - protocol: openai
      model: text-embedding-v3
      api_key: "sk-4fd381820c2b4168932af0b7ac6273ad"
      base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"

  # Rerank 模型配置
  rerank:
    - protocol: openai
      model: qwen3-vl-rerank
      api_key: "sk-4fd381820c2b4168932af0b7ac6273ad"
      base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"

# ========================================
# 任务队列配置（arq，基于 Redis）
# ========================================
task_queue:
  max_jobs: 3              # Worker 最大并发任务数
  job_timeout: 7200        # 单任务超时（秒），2 小时
  max_tries: 3             # 最大重试次数
  retry_base_delay: 60     # 重试基础延迟（秒）
  queue_name: "arq:queue"  # Redis 队列键名

# 技能广场配置
skill_marketplace:
  llm_review_enabled: false        # LLM 安全审查开关，管理员可通过 API 开启
  llm_review_model: null           # 审查使用的模型，null 表示使用系统默认 LLM
