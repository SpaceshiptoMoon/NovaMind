# ========================================
# 生产环境配置
# ========================================
# 敏感信息使用环境变量占位符，其他配置继承自 default.yaml

environment: production
debug: false

# MinIO 配置（生产环境）
minio:
  endpoint: ${MINIO_ENDPOINT}
  access_key: ${MINIO_ACCESS_KEY}
  secret_key: ${MINIO_SECRET_KEY}
  secure: true
  region: ${MINIO_REGION:us-east-1}
  bucket_name: ${MINIO_BUCKET:knowledge-base}

# Elasticsearch 配置（生产环境）
elasticsearch:
  hosts:
    - "${ES_HOST}"
  username: ${ES_USERNAME:}
  password: ${ES_PASSWORD:}

# 生产数据库覆盖
database:
  host: ${DB_HOST}
  port: ${DB_PORT:3306}
  user: ${DB_USER}
  password: ${DB_PASSWORD}
  database: ${DB_NAME}
  pool_size: 20
  max_overflow: 40

# Redis - 生产环境启用
redis:
  enabled: true
  host: ${REDIS_HOST}
  port: ${REDIS_PORT:6379}
  password: ${REDIS_PASSWORD:}

# 敏感配置覆盖
llm:
  api_key: ${LLM_API_KEY}

embedding:
  api_key: ${EMBEDDING_API_KEY}

security:
  secret_key: ${SECRET_KEY}

# 日志级别覆盖
logging:
  level: INFO
  format: json

# 生产环境缓存配置
cache:
  search_result_ttl: 7200  # 2小时
