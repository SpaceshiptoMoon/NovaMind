# ========================================
# 测试环境配置
# ========================================
# 只需覆盖需要改变的部分，其他配置继承自 default.yaml

environment: testing
debug: false

# MinIO 配置（测试环境）
minio:
  endpoint: localhost:9000
  access_key: minioadmin
  secret_key: minioadmin
  secure: false

# Elasticsearch 配置（测试环境）
elasticsearch:
  hosts:
    - "http://localhost:9200"

# 测试数据库覆盖
database:
  database: novamind_test

# 日志级别覆盖
logging:
  level: DEBUG
  format: console
