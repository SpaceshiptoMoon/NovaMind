# ========================================
# Docker Compose 环境配置
# ========================================
# 服务间通过容器名通信，不使用 localhost
# 此文件会被挂载到后端容器中，通过 --config docker 加载

environment: docker
debug: false

# Redis
redis:
  enabled: true
  host: redis
  port: 6379
  db: 0
  password: null

# MinIO
minio:
  endpoint: minio:9005
  access_key: ***REMOVED***
  secret_key: ***REMOVED***
  secure: false

# Elasticsearch
elasticsearch:
  hosts:
    - "http://elasticsearch:9200"
  username: elastic
  password: ***REMOVED***

# MySQL
database:
  host: mysql
  port: 3306
  user: root
  password: "***REMOVED***"
  database: intelligent_system_db

# 日志
logging:
  level: INFO
  format: json
